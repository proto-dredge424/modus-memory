  <text x="400" y="185" font-family="monospace" font-size="11" fill="#bc8cff" text-anchor="middle">memory kernel  ·  MCP + attachment  ·  governed recall</text>

  <!-- Three arrows down -->
  <line x1="280" y1="197" x2="200" y2="240" stroke="#58a6ff" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="197" x2="400" y2="240" stroke="#bc8cff" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="197" x2="600" y2="240" stroke="#7ee787" stroke-width="1" opacity="0.4"/>

  <!-- BM25 Search Engine -->
  <rect x="100" y="240" width="190" height="70" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="1"/>
  <text x="195" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#58a6ff" text-anchor="middle" font-weight="600">Search Engine</text>
  <text x="195" y="282" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">BM25 + field boosting</text>
  <text x="195" y="298" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">route planning + librarian</text>

  <!-- FSRS Memory -->
  <rect x="305" y="240" width="190" height="70" rx="8" fill="#1c2333" stroke="#bc8cff" stroke-width="1"/>
  <text x="400" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#bc8cff" text-anchor="middle" font-weight="600">Memory Layer</text>
  <text x="400" y="282" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">episodes + facts + recalls</text>
  <text x="400" y="298" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">decay + reinforcement + review</text>

  <!-- Cross-Reference -->
  <rect x="510" y="240" width="190" height="70" rx="8" fill="#1c2333" stroke="#7ee787" stroke-width="1"/>
  <text x="605" y="265" font-family="system-ui, sans-serif" font-size="13" fill="#7ee787" text-anchor="middle" font-weight="600">Protected Structure</text>
  <text x="605" y="282" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">lineage · entities · missions</text>
  <text x="605" y="298" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">elder tier + secure-state audit</text>

  <!-- Arrow to vault -->
  <line x1="195" y1="310" x2="300" y2="350" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="310" x2="400" y2="350" stroke="#bc8cff" stroke-width="1" opacity="0.3"/>
  <line x1="605" y1="310" x2="500" y2="350" stroke="#7ee787" stroke-width="1" opacity="0.3"/>

  <!-- Vault (bottom) -->
  <rect x="230" y="350" width="340" height="55" rx="8" fill="#1c2333" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="373" font-family="system-ui, sans-serif" font-size="14" fill="#e6edf3" text-anchor="middle" font-weight="600">Sovereign Vault</text>
  <text x="400" y="393" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">plain markdown  ·  yaml frontmatter  ·  your data</text>
