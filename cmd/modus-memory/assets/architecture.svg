<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">HOMING ARCHITECTURE</text>

  <!-- AI Client box (top) -->
  <rect x="280" y="55" width="240" height="50" rx="8" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="400" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#e6edf3" text-anchor="middle" font-weight="600">Any MCP Client Or Shell Carrier</text>
  <text x="400" y="95" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">Claude, Cursor, Codex, Qwen, OpenClaw...</text>

  <!-- Arrow down -->
  <line x1="400" y1="105" x2="400" y2="135" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  <polygon points="394,132 400,142 406,132" fill="#58a6ff" opacity="0.6"/>
  <text x="418" y="125" font-family="monospace" font-size="10" fill="#58a6ff" opacity="0.7">mcp / attach</text>

  <!-- MCP Server box -->
  <rect x="200" y="142" width="400" height="55" rx="8" fill="#1a2332" stroke="#bc8cff" stroke-width="1.5"/>
