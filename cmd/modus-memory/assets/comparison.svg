<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="320" fill="url(#bg3)" rx="12"/>

  <!-- Header -->
  <text x="400" y="35" font-family="system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">WHY HOMING</text>

  <!-- Column headers -->
  <text x="260" y="70" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Feature</text>
  <text x="460" y="70" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Cloud Memory</text>
  <text x="660" y="70" font-family="system-ui, sans-serif" font-size="13" fill="#bc8cff" text-anchor="middle" font-weight="600">Homing</text>

  <line x1="100" y1="80" x2="700" y2="80" stroke="#30363d" stroke-width="1"/>

  <!-- Rows -->
  <!-- Row 1: Data -->
  <text x="260" y="108" font-family="system-ui, sans-serif" font-size="13" fill="#e6edf3" text-anchor="middle">Your data lives</text>
  <text x="460" y="108" font-family="monospace" font-size="12" fill="#f85149" text-anchor="middle">Their servers</text>
  <text x="660" y="108" font-family="monospace" font-size="12" fill="#7ee787" text-anchor="middle">Your machine</text>

  <line x1="140" y1="120" x2="660" y2="120" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>

  <!-- Row 2: Retrieval -->
  <text x="260" y="148" font-family="system-ui, sans-serif" font-size="13" fill="#e6edf3" text-anchor="middle">Retrieval model</text>
  <text x="460" y="148" font-family="monospace" font-size="12" fill="#f85149" text-anchor="middle">Flat recall</text>
  <text x="660" y="148" font-family="monospace" font-size="12" fill="#7ee787" text-anchor="middle">Route-aware homing</text>

  <line x1="140" y1="160" x2="660" y2="160" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>

  <!-- Row 3: Agent fit -->
  <text x="260" y="188" font-family="system-ui, sans-serif" font-size="13" fill="#e6edf3" text-anchor="middle">Agent fit</text>
  <text x="460" y="188" font-family="monospace" font-size="12" fill="#f85149" text-anchor="middle">Tool path only</text>
  <text x="660" y="188" font-family="monospace" font-size="12" fill="#7ee787" text-anchor="middle">MCP + shell attachment</text>

  <line x1="140" y1="200" x2="660" y2="200" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>

  <!-- Row 4: Evidence -->
  <text x="260" y="228" font-family="system-ui, sans-serif" font-size="13" fill="#e6edf3" text-anchor="middle">Evidence trail</text>
  <text x="460" y="228" font-family="monospace" font-size="12" fill="#f85149" text-anchor="middle">Opaque memory</text>
  <text x="660" y="228" font-family="monospace" font-size="12" fill="#7ee787" text-anchor="middle">Receipts + traces</text>

  <line x1="140" y1="240" x2="660" y2="240" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>

  <!-- Row 5: Storage -->
  <text x="260" y="268" font-family="system-ui, sans-serif" font-size="13" fill="#e6edf3" text-anchor="middle">Storage format</text>
  <text x="460" y="268" font-family="monospace" font-size="12" fill="#f85149" text-anchor="middle">Proprietary DB</text>
  <text x="660" y="268" font-family="monospace" font-size="12" fill="#7ee787" text-anchor="middle">Plain markdown</text>

  <line x1="140" y1="280" x2="660" y2="280" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>

  <!-- Row 6: Setup -->
  <text x="260" y="308" font-family="system-ui, sans-serif" font-size="13" fill="#e6edf3" text-anchor="middle">Setup burden</text>
  <text x="460" y="308" font-family="monospace" font-size="12" fill="#f85149" text-anchor="middle">Infra stack</text>
  <text x="660" y="308" font-family="monospace" font-size="12" fill="#7ee787" text-anchor="middle">One binary</text>
</svg>
