<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#bc8cff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0" />
    </linearGradient>
    <!-- Brain/memory circuit pattern -->
    <pattern id="circuit" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="#30363d" opacity="0.5"/>
      <line x1="30" y1="30" x2="60" y2="30" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
      <line x1="30" y1="30" x2="30" y2="0" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>
  <rect width="900" height="300" fill="url(#circuit)" rx="12" opacity="0.6"/>

  <!-- Subtle glow line -->
  <rect x="50" y="198" width="800" height="2" fill="url(#accent)" rx="1" opacity="0.4"/>

  <!-- Memory icon cluster (left side) -->
  <g transform="translate(80, 100)" opacity="0.9">
    <!-- Central node -->
    <circle cx="50" cy="50" r="22" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="50" cy="50" r="8" fill="#58a6ff" opacity="0.6"/>

    <!-- Connected nodes -->
    <circle cx="0" cy="20" r="5" fill="#bc8cff" opacity="0.5"/>
    <line x1="10" y1="25" x2="30" y2="40" stroke="#bc8cff" stroke-width="0.8" opacity="0.4"/>

    <circle cx="100" cy="20" r="5" fill="#58a6ff" opacity="0.5"/>
    <line x1="90" y1="25" x2="70" y2="40" stroke="#58a6ff" stroke-width="0.8" opacity="0.4"/>

    <circle cx="20" cy="95" r="4" fill="#58a6ff" opacity="0.4"/>
    <line x1="25" y1="90" x2="40" y2="70" stroke="#58a6ff" stroke-width="0.8" opacity="0.3"/>

    <circle cx="85" cy="90" r="4" fill="#bc8cff" opacity="0.4"/>
    <line x1="80" y1="85" x2="65" y2="65" stroke="#bc8cff" stroke-width="0.8" opacity="0.3"/>

    <circle cx="-10" cy="65" r="3" fill="#58a6ff" opacity="0.3"/>
    <line x1="-5" y1="62" x2="30" y2="50" stroke="#58a6ff" stroke-width="0.5" opacity="0.2"/>

    <circle cx="110" cy="60" r="3" fill="#bc8cff" opacity="0.3"/>
    <line x1="105" y1="58" x2="72" y2="50" stroke="#bc8cff" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Title -->
  <text x="280" y="118" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="-1.2">Homing</text>
  <text x="280" y="142" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#58a6ff" letter-spacing="2">BY MODUS</text>

  <!-- Subtitle -->
  <text x="280" y="172" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#8b949e" letter-spacing="0.2">Sovereign memory kernel for agents. Route-aware recall. One binary. Zero cloud.</text>

  <!-- Feature pills -->
  <g transform="translate(280, 220)">
    <rect x="0" y="0" width="82" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="41" y="18" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle">BM25</text>

    <rect x="92" y="0" width="92" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="138" y="18" font-family="monospace" font-size="11" fill="#bc8cff" text-anchor="middle">Episodes</text>

    <rect x="194" y="0" width="92" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="240" y="18" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle">Routes</text>

    <rect x="296" y="0" width="92" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="342" y="18" font-family="monospace" font-size="11" fill="#bc8cff" text-anchor="middle">Elder</text>

    <rect x="398" y="0" width="82" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="439" y="18" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle">MCP</text>

    <rect x="490" y="0" width="90" height="28" rx="14" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
    <text x="535" y="18" font-family="monospace" font-size="11" fill="#7ee787" text-anchor="middle">~8MB</text>
  </g>
</svg>
